version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sdr_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Exclude node_modules or virtual environments if they exist
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
